# ==========================================
# CONFIGURACIÓN PRINCIPAL DEL GATEWAY
# ==========================================
server.port=8080
spring.application.name=gateway-service

# ==========================================
# CONFIGURACIÓN CORS (Para conectar con Frontend React/Angular)
# ==========================================
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*

# ==========================================
# RUTAS DE LOS 11 MICROSERVICIOS
# ==========================================

# 1. Auth Service
spring.cloud.gateway.routes[0].id=auth-servicess
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

# 2. Estudiante Service
spring.cloud.gateway.routes[1].id=estudiante-service
spring.cloud.gateway.routes[1].uri=http://localhost:8082
