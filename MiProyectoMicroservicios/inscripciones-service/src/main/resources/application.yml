server:
  port: 8087

spring:
  application:
    name: inscripciones-service
  datasource:
    # Usamos la variable DB_HOST que inyecta Docker. Si no existe, usa localhost.
    url: jdbc:mysql://${DB_HOST:localhost}:3306/db_inscripciones
    username: ${DB_USER:root}
    password: ${DB_PASS:}
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

springdoc:
  swagger-ui:
    path: /
  enable-hateoas: false

eureka:
  client:
    eureka-server-http-client-name: RestClient
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  info:
    env:
      enabled: true