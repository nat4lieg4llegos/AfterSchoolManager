server.port=8083
spring.application.name=talleres-service

spring.datasource.url=jdbc:mysql://localhost:3306/db_talleres?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# validate: Hibernate verifica las tablas pero NO las crea, Flyway se encarga
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Configuraciˇn de Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
springdoc.swagger-ui.path=/
springdoc.enable-hateoas=false