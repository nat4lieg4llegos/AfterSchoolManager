  talleres-service:
    build: ./talleres-service
    container_name: ms_talleres
    ports:
      - "8083:8083"
    networks:
      - afterschool-net
    environment:
      - DB_HOST=mariadb-server
      - DB_USER=root
      - DB_PASS=root
      - EUREKA_URL=http://eureka-server:8761/eureka/
      - SPRING_PROFILES_ACTIVE=prod
