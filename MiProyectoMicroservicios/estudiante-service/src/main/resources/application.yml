spring:
  application:
    name: estudiante-service
  datasource:
    # Usamos la variable DB_HOST que inyecta Docker. Si no existe, usa localhost.
    url: jdbc:mysql://${DB_HOST:localhost}:3306/db_estudiantes
    username: ${DB_USER:root}
    password: ${DB_PASS:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8081

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /
  enable-hateoas: false

eureka:
  client:
    eureka-server-http-client-name: RestClient
    register-with-eureka: true
    fetch-registry: true
    service-url:
      # Usamos la variable EUREKA_URL que inyecta Docker.
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  info:
    env:
      enabled: true