# Puerto asignado para el servicio de Inscripciones
server.port=8087
spring.application.name=inscripciones

# Configuración de Conexión a MySQL (XAMPP)
spring.datasource.url=jdbc:mysql://localhost:3306/db_inscripciones?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA / Hibernate
spring.jpa.show-sql=true
# validate: Hibernate verifica las tablas pero NO las crea, Flyway se encarga
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Configuración de Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true