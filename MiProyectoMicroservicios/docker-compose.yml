      - EUREKA_URL=http://eureka-server:8761/eureka/
      - SPRING_PROFILES_ACTIVE=prod
    depends_on:
      - mariadb-server
      - eureka-server

networks:
  afterschool-net:
    driver: bridge

volumes:
  mariadb_data: