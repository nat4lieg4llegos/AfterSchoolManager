services:
  mariadb-server:
    image: mariadb:11.4
    container_name: afterschool_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    networks:
      - afterschool-net
    volumes:
      - ./basedatosproyecto.sql:/docker-entrypoint-initdb.d/init.sql
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 15

  eureka-server:
    build: ./eureka-server
    container_name: eureka_server
    ports:
      - "8761:8761"
    networks:
      - afterschool-net

  gateway-service:
    build: ./gateway-service
    container_name: api_gateway
    ports:
      - "8080:8080"
    networks:
      - afterschool-net
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka/
    depends_on:
      - eureka-server

  auth-service:
    build: ./auth-service
    container_name: ms_auth
    networks:
      - afterschool-net
    environment:
      - DB_HOST=mariadb-server
      - DB_USER=root
      - DB_PASS=root
      - EUREKA_URL=http://eureka-server:8761/eureka/
    depends_on:
      mariadb-server:
        condition: service_healthy
      eureka-server:
        condition: service_started

  estudiante-service:
